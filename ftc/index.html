<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTC Team Match Stats</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #14213d;
      --muted: #4a5568;
      --brand: #0b5fff;
      --good: #0f9d58;
      --bad: #d93025;
      --border: #d9e1ec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top left, #e8efff, var(--bg) 45%);
      color: var(--ink);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 1.8rem;
    }

    p {
      margin-top: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    form {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    input {
      flex: 1;
      min-width: 220px;
      padding: 0.65rem 0.75rem;
      border: 1px solid #b7c4d6;
      border-radius: 10px;
      font-size: 1rem;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 0.65rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      background: var(--brand);
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 1rem 0;
    }

    .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      background: #f9fbff;
      color: var(--ink);
      font-size: 0.95rem;
    }

    .status {
      min-height: 1.5rem;
      font-weight: 600;
    }

    .error {
      color: var(--bad);
    }

    .success {
      color: var(--good);
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      min-width: 760px;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 0.6rem;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f4f8ff;
      color: #243b62;
      position: sticky;
      top: 0;
    }

    .result-win {
      color: var(--good);
      font-weight: 700;
    }

    .result-loss {
      color: var(--bad);
      font-weight: 700;
    }

    .result-tie {
      color: #b26b00;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>FTC Team Average Score</h1>
      <p>Enter an FTC team number to calculate average score from this season and see recent match results.</p>

      <form id="team-form">
        <input id="team-number" type="number" min="1" step="1" placeholder="Example: 1" required>
        <button id="submit-btn" type="submit">Load Team Stats</button>
      </form>

      <div id="status" class="status"></div>

      <div class="meta" id="summary" hidden>
        <div class="pill" id="season-pill">Season: -</div>
        <div class="pill" id="avg-pill">Average score: -</div>
        <div class="pill" id="count-pill">Scored matches: -</div>
      </div>

      <div class="table-wrap" id="table-wrap" hidden>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Event</th>
              <th>Level</th>
              <th>Match</th>
              <th>Alliance</th>
              <th>Team Score</th>
              <th>Opponent</th>
              <th>Result</th>
            </tr>
          </thead>
          <tbody id="matches-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://ftc-api.firstinspires.org/v2.0";
    const FTC_USERNAME = "jjay3644";
    const FTC_TOKEN = "1CCFF6D1-DA19-456A-A0E0-85C0D6CBB32E";

    const form = document.getElementById("team-form");
    const teamInput = document.getElementById("team-number");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const summaryEl = document.getElementById("summary");
    const seasonPill = document.getElementById("season-pill");
    const avgPill = document.getElementById("avg-pill");
    const countPill = document.getElementById("count-pill");
    const tableWrap = document.getElementById("table-wrap");
    const matchesBody = document.getElementById("matches-body");

    function setStatus(message, kind = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${kind}`;
    }

    function apiGet(path) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", `${API_BASE}${path}`, true, FTC_USERNAME, FTC_TOKEN);
        xhr.responseType = "json";

        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            if (xhr.response !== null) {
              resolve(xhr.response);
              return;
            }

            try {
              resolve(JSON.parse(xhr.responseText));
            } catch (error) {
              reject(new Error("API returned non-JSON response."));
            }
            return;
          }

          reject(new Error(`API ${xhr.status}: ${xhr.responseText || "Unknown error"}`));
        };

        xhr.onerror = () => {
          reject(new Error("Network/CORS error while contacting FTC API."));
        };

        xhr.send();
      });
    }

    function parseTeamMatch(match, teamNumber, eventName) {
      const teamEntry = (match.teams || []).find((t) => Number(t.teamNumber) === Number(teamNumber));
      if (!teamEntry) {
        return null;
      }

      if (match.tournamentLevel === "PRACTICE") {
        return null;
      }

      const isRed = String(teamEntry.station || "").toLowerCase().startsWith("red");
      const teamScore = isRed ? match.scoreRedFinal : match.scoreBlueFinal;
      const opponentScore = isRed ? match.scoreBlueFinal : match.scoreRedFinal;

      if (typeof teamScore !== "number" || typeof opponentScore !== "number") {
        return null;
      }

      let result = "T";
      if (teamScore > opponentScore) result = "W";
      if (teamScore < opponentScore) result = "L";

      return {
        date: match.actualStartTime || match.modifiedOn || null,
        event: eventName,
        level: match.tournamentLevel,
        matchLabel: `${match.series || 0}-${match.matchNumber || 0}`,
        alliance: isRed ? "Red" : "Blue",
        teamScore,
        opponentScore,
        result
      };
    }

    function renderMatches(matches) {
      matchesBody.innerHTML = "";

      for (const match of matches) {
        const tr = document.createElement("tr");

        const when = match.date ? new Date(match.date).toLocaleString() : "Unknown";
        const resultClass = match.result === "W" ? "result-win" : match.result === "L" ? "result-loss" : "result-tie";

        tr.innerHTML = `
          <td>${when}</td>
          <td>${match.event}</td>
          <td>${match.level}</td>
          <td>${match.matchLabel}</td>
          <td>${match.alliance}</td>
          <td>${match.teamScore}</td>
          <td>${match.opponentScore}</td>
          <td class="${resultClass}">${match.result}</td>
        `;

        matchesBody.appendChild(tr);
      }

      tableWrap.hidden = matches.length === 0;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const teamNumber = Number(teamInput.value);

      if (!Number.isInteger(teamNumber) || teamNumber <= 0) {
        setStatus("Enter a valid positive team number.", "error");
        return;
      }

      submitBtn.disabled = true;
      summaryEl.hidden = true;
      tableWrap.hidden = true;
      matchesBody.innerHTML = "";
      setStatus("Loading season, events, and matches...", "");

      try {
        const root = await apiGet("/");
        const season = root.currentSeason;

        const eventsData = await apiGet(`/${season}/events?teamNumber=${teamNumber}`);
        const events = eventsData.events || [];

        if (events.length === 0) {
          setStatus(`No events found for team ${teamNumber} in season ${season}.`, "error");
          return;
        }

        const sortedEvents = [...events].sort((a, b) => {
          const aTime = a.dateEnd ? new Date(a.dateEnd).getTime() : 0;
          const bTime = b.dateEnd ? new Date(b.dateEnd).getTime() : 0;
          return bTime - aTime;
        });

        const recentEvents = sortedEvents.slice(0, 5);
        const matchesPerEvent = await Promise.all(
          recentEvents.map((evt) => apiGet(`/${season}/matches/${evt.code}`))
        );

        const allTeamMatches = [];
        for (let i = 0; i < recentEvents.length; i += 1) {
          const evt = recentEvents[i];
          const matches = matchesPerEvent[i].matches || [];

          for (const match of matches) {
            const parsed = parseTeamMatch(match, teamNumber, evt.name || evt.code);
            if (parsed) {
              allTeamMatches.push(parsed);
            }
          }
        }

        allTeamMatches.sort((a, b) => {
          const aTime = a.date ? new Date(a.date).getTime() : 0;
          const bTime = b.date ? new Date(b.date).getTime() : 0;
          return bTime - aTime;
        });

        const recentMatches = allTeamMatches.slice(0, 20);

        if (recentMatches.length === 0) {
          setStatus(`Found events for team ${teamNumber}, but no scored non-practice matches were available.`, "error");
          return;
        }

        const totalScore = recentMatches.reduce((sum, m) => sum + m.teamScore, 0);
        const average = totalScore / recentMatches.length;

        seasonPill.textContent = `Season: ${season}`;
        avgPill.textContent = `Average score: ${average.toFixed(2)}`;
        countPill.textContent = `Scored matches: ${recentMatches.length}`;

        renderMatches(recentMatches);
        summaryEl.hidden = false;
        setStatus(`Loaded ${recentMatches.length} recent matches for team ${teamNumber}.`, "success");
      } catch (error) {
        console.error(error);
        setStatus(
          `Failed to load FTC data. ${error.message} If this is a CORS block, this site needs a server-side proxy endpoint.`,
          "error"
        );
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
